# ===================================
# AI Code Review - Docker Compose (Development)
# ===================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET:-your-secret-key-change-in-production}
      # OAuth (optional)
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID:-}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET:-}
      - AUTH_GITLAB_ID=${AUTH_GITLAB_ID:-}
      - AUTH_GITLAB_SECRET=${AUTH_GITLAB_SECRET:-}
      # OpenAI (optional)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      # Persist SQLite database
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  app-data:
    driver: local
