# ===================================
# AI Code Review - Docker Compose (Production)
# ===================================

services:
  app:
    image: ${DH_USERNAME:-thongphm}/ai-codereview:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      # OAuth
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID:-}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET:-}
      - AUTH_GITLAB_ID=${AUTH_GITLAB_ID:-}
      - AUTH_GITLAB_SECRET=${AUTH_GITLAB_SECRET:-}
      # AI Provider
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Auth URL for NextAuth (required in production)
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
    volumes:
      - app-data:/app/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app-data:
    driver: local
